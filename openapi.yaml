openapi: 3.0.3
info:
  title: Resting API
  description: |
    A REST API for managing a vinyl record collection. Built as a school project to learn about REST APIs, HTTP/HTTPS, and PHP.

    ## Authentication

    Write operations (POST, PUT, PATCH, DELETE) require HTTP Basic Authentication.

    **Username:** `admin`
    **Password:** `secret`

    ## Pagination

    List endpoints support pagination via `limit` and `offset` query parameters.

    ## Condition Grading

    Records use the Goldmine grading standard for media and sleeve conditions:
    - **Mint (M)** - Perfect, unplayed condition
    - **Near Mint (NM)** - Nearly perfect with minimal signs of handling
    - **Very Good Plus (VG+)** - Shows some signs of play but well cared for
    - **Very Good (VG)** - Surface noise evident, groove wear visible
    - **Good (G)** - Significant wear affecting playback
    - **Fair (F)** - Plays through but with significant issues
    - **Poor (P)** - Barely playable, for completists only
  version: 1.0.0
  contact:
    name: Mikkel Elvers
    url: https://github.com/mkelvers

servers:
  - url: https://resting-api.mkelvers.tech
    description: Production
  - url: http://localhost:8080
    description: Local development

security:
  - BasicAuth: []

tags:
  - name: Records
    description: Vinyl records in the collection
  - name: Artists
    description: Musicians and bands
  - name: Genres
    description: Music genres
  - name: Labels
    description: Record labels
  - name: Countries
    description: Countries of origin
  - name: Images
    description: Record cover art
  - name: Tracks
    description: Album tracks

paths:
  /records:
    get:
      tags: [Records]
      summary: List all records
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of records
          content:
            application/json:
              example:
                data:
                  - id: 1
                  - id: 2
                total: 150
                limit: 20
                offset: 0

    post:
      tags: [Records]
      summary: Create a record
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, price]
              properties:
                title:
                  type: string
                description:
                  type: string
                price:
                  type: number
                media_condition:
                  type: string
                  enum: ["Mint", "Near Mint", "Very Good Plus", "Very Good", "Good", "Fair", "Poor"]
                sleeve_condition:
                  type: string
                  enum: ["Mint", "Near Mint", "Very Good Plus", "Very Good", "Good", "Fair", "Poor"]
                stock:
                  type: integer
                format:
                  type: string
                  enum: ["LP", "EP", "Single", "7\"", "10\"", "12\""]
                release_date:
                  type: string
                  format: date
                country_id:
                  type: integer
      responses:
        '201':
          description: Record created
          content:
            application/json:
              example:
                message: "record created"
                id: 42
        '400':
          description: Validation error
        '401':
          description: Unauthorized

  /records/{id}:
    get:
      tags: [Records]
      summary: Get a single record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Record details
          content:
            application/json:
              example:
                id: 1
                title: "Abbey Road"
                price: 29.99
                images: []
                artists: []
                labels: []
                genres: []
                tracks: []
                credits: []
        '400':
          description: Invalid ID
        '404':
          description: Record not found

    put:
      tags: [Records]
      summary: Replace a record
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, price]
              properties:
                title:
                  type: string
                description:
                  type: string
                price:
                  type: number
                media_condition:
                  type: string
                sleeve_condition:
                  type: string
                stock:
                  type: integer
                format:
                  type: string
                release_date:
                  type: string
                country_id:
                  type: integer
      responses:
        '200':
          description: Record updated
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '404':
          description: Record not found

    patch:
      tags: [Records]
      summary: Partially update a record
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                price:
                  type: number
                media_condition:
                  type: string
                sleeve_condition:
                  type: string
                stock:
                  type: integer
                format:
                  type: string
                release_date:
                  type: string
                country_id:
                  type: integer
      responses:
        '200':
          description: Record updated
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '404':
          description: Record not found

    delete:
      tags: [Records]
      summary: Delete a record
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Record deleted
        '400':
          description: Invalid ID
        '401':
          description: Unauthorized
        '404':
          description: Record not found

  /records/{id}/images:
    post:
      tags: [Images]
      summary: Add an image
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                alt_text:
                  type: string
      responses:
        '201':
          description: Image created
        '400':
          description: URL required
        '401':
          description: Unauthorized
        '404':
          description: Record not found

  /records/{id}/images/{image_id}:
    patch:
      tags: [Images]
      summary: Update an image
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: image_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                alt_text:
                  type: string
      responses:
        '200':
          description: Image updated
        '400':
          description: Invalid IDs
        '401':
          description: Unauthorized
        '404':
          description: Image not found

    delete:
      tags: [Images]
      summary: Delete an image
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: image_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Image deleted
        '400':
          description: Invalid IDs
        '401':
          description: Unauthorized
        '404':
          description: Image not found

  /records/{id}/tracks:
    post:
      tags: [Tracks]
      summary: Add a track
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                duration:
                  type: string
                position:
                  type: integer
                side:
                  type: string
                  enum: ["A", "B"]
      responses:
        '201':
          description: Track created
        '400':
          description: Title required
        '401':
          description: Unauthorized
        '404':
          description: Record not found

  /records/{id}/tracks/{track_id}:
    patch:
      tags: [Tracks]
      summary: Update a track
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: track_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                duration:
                  type: string
                position:
                  type: integer
                side:
                  type: string
                  enum: ["A", "B"]
      responses:
        '200':
          description: Track updated
        '400':
          description: Invalid IDs
        '401':
          description: Unauthorized
        '404':
          description: Track not found

    delete:
      tags: [Tracks]
      summary: Delete a track
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: track_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Track deleted
        '400':
          description: Invalid IDs
        '401':
          description: Unauthorized
        '404':
          description: Track not found

  /artists:
    get:
      tags: [Artists]
      summary: List all artists
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of artists

    post:
      tags: [Artists]
      summary: Create an artist
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Artist created
        '400':
          description: Name required
        '401':
          description: Unauthorized

  /artists/{id}:
    get:
      tags: [Artists]
      summary: Get a single artist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Artist details
        '400':
          description: Invalid ID
        '404':
          description: Artist not found

    patch:
      tags: [Artists]
      summary: Update an artist
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Artist updated
        '400':
          description: Name required
        '401':
          description: Unauthorized
        '404':
          description: Artist not found

    delete:
      tags: [Artists]
      summary: Delete an artist
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Artist deleted
        '400':
          description: Invalid ID
        '401':
          description: Unauthorized
        '404':
          description: Artist not found

  /genres:
    get:
      tags: [Genres]
      summary: List all genres
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of genres
          content:
            application/json:
              example:
                count: 10
                limit: 20
                offset: 0
                results:
                  - id: 1
                    name: "Rock"

    post:
      tags: [Genres]
      summary: Create a genre
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Genre created
          content:
            application/json:
              example:
                id: 1
                name: "Rock"
        '400':
          description: Name required
        '401':
          description: Unauthorized
        '409':
          description: Genre already exists

  /genres/{id}:
    delete:
      tags: [Genres]
      summary: Delete a genre
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Genre deleted
          content:
            application/json:
              example:
                message: "genre deleted"
        '401':
          description: Unauthorized
        '404':
          description: Genre not found

  /labels:
    get:
      tags: [Labels]
      summary: List all labels
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of labels
          content:
            application/json:
              example:
                count: 10
                limit: 20
                offset: 0
                results:
                  - id: 1
                    name: "Apple Records"

    post:
      tags: [Labels]
      summary: Create a label
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Label created
          content:
            application/json:
              example:
                id: 1
                name: "Apple Records"
        '400':
          description: Name required
        '401':
          description: Unauthorized
        '409':
          description: Label already exists

  /labels/{id}:
    delete:
      tags: [Labels]
      summary: Delete a label
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Label deleted
          content:
            application/json:
              example:
                message: "label deleted"
        '401':
          description: Unauthorized
        '404':
          description: Label not found

  /countries:
    get:
      tags: [Countries]
      summary: List all countries
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of countries
          content:
            application/json:
              example:
                count: 10
                limit: 20
                offset: 0
                results:
                  - id: 1
                    name: "United Kingdom"

    post:
      tags: [Countries]
      summary: Create a country
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Country created
          content:
            application/json:
              example:
                id: 1
                name: "United Kingdom"
        '400':
          description: Name required
        '401':
          description: Unauthorized
        '409':
          description: Country already exists

  /countries/{id}:
    delete:
      tags: [Countries]
      summary: Delete a country
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Country deleted
          content:
            application/json:
              example:
                message: "country deleted"
        '401':
          description: Unauthorized
        '404':
          description: Country not found

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
